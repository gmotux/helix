<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="965" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <pattern id="blind" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#3b6ea5" fill-opacity="0.10"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#3b6ea5" stroke-width="1.4" stroke-opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1120" height="965" fill="#f5f3ee"/>
  <text x="60" y="27" font-size="19" font-weight="bold" fill="#222">Todd Extraction — Philadelphia Holiday Inn · Lounge &amp; Bar</text>
  <text x="60" y="45" font-size="12" fill="#666">1 square = 5 ft · N up · red = operator · gold = Todd · grey # = civilian (keyed below) · pink = camera view · hatch = camera blind</text>

  <!-- ===================== ROOM FLOOR ===================== -->
  <rect x="60" y="55" width="650" height="450" fill="#ece7dc"/>
  <g stroke="#d3ccbc" stroke-width="1">
    <line x1="110" y1="55" x2="110" y2="505"/><line x1="160" y1="55" x2="160" y2="505"/>
    <line x1="210" y1="55" x2="210" y2="505"/><line x1="260" y1="55" x2="260" y2="505"/>
    <line x1="310" y1="55" x2="310" y2="505"/><line x1="360" y1="55" x2="360" y2="505"/>
    <line x1="410" y1="55" x2="410" y2="505"/><line x1="460" y1="55" x2="460" y2="505"/>
    <line x1="510" y1="55" x2="510" y2="505"/><line x1="560" y1="55" x2="560" y2="505"/>
    <line x1="610" y1="55" x2="610" y2="505"/><line x1="660" y1="55" x2="660" y2="505"/>
    <line x1="60" y1="105" x2="710" y2="105"/><line x1="60" y1="155" x2="710" y2="155"/>
    <line x1="60" y1="205" x2="710" y2="205"/><line x1="60" y1="255" x2="710" y2="255"/>
    <line x1="60" y1="305" x2="710" y2="305"/><line x1="60" y1="355" x2="710" y2="355"/>
    <line x1="60" y1="405" x2="710" y2="405"/><line x1="60" y1="455" x2="710" y2="455"/>
  </g>

  <!-- camera coverage -->
  <polygon points="485,60 310,150 660,150" fill="#c0392b" fill-opacity="0.13"/>
  <polygon points="385,255 210,160 700,160 700,450 210,450" fill="#c0392b" fill-opacity="0.08"/>
  <polygon points="385,500 235,320 535,320" fill="#c0392b" fill-opacity="0.10"/>
  <polygon points="708,180 600,130 600,230" fill="#c0392b" fill-opacity="0.12"/>

  <!-- NW booth + blind wedge -->
  <rect x="62" y="57" width="96" height="96" fill="#dcd3c0" stroke="#b3a988" stroke-width="2"/>
  <rect x="62" y="57" width="96" height="22" fill="#c9bfa6"/>
  <rect x="62" y="57" width="22" height="96" fill="#c9bfa6"/>
  <rect x="62" y="57" width="96" height="96" fill="url(#blind)"/>
  <text x="112" y="100" font-size="10" text-anchor="middle" fill="#2b4a6b">empty booth</text>
  <text x="110" y="170" font-size="10" text-anchor="middle" fill="#2b4a6b" font-weight="bold">C3 BLIND</text>

  <!-- column -->
  <rect x="173" y="143" width="24" height="24" fill="#7a7163" stroke="#4d463b" stroke-width="2"/>
  <text x="185" y="138" font-size="9" text-anchor="middle" fill="#555">column</text>

  <!-- bar -->
  <rect x="310" y="55" width="350" height="34" fill="#8a5a2b" stroke="#5e3c1a" stroke-width="2"/>
  <text x="430" y="78" font-size="13" text-anchor="middle" fill="#fff" font-weight="bold">B A R</text>

  <!-- lounge tables (incl. Garrity's two-top at left) -->
  <g fill="#ddd3bd" stroke="#b3a988" stroke-width="1.5">
    <circle cx="250" cy="290" r="20"/><circle cx="470" cy="360" r="24"/>
    <circle cx="610" cy="300" r="24"/><circle cx="260" cy="430" r="20"/>
  </g>

  <!-- ===== CIVILIANS (numbered) ===== -->
  <g stroke="#6c7075" stroke-width="1.5">
    <circle cx="335" cy="115" r="11" fill="#9aa0a6"/><circle cx="435" cy="115" r="11" fill="#9aa0a6"/>
    <circle cx="535" cy="115" r="11" fill="#9aa0a6"/><circle cx="585" cy="115" r="11" fill="#9aa0a6"/>
    <circle cx="635" cy="115" r="11" fill="#9aa0a6"/>
    <circle cx="443" cy="340" r="11" fill="#9aa0a6"/><circle cx="500" cy="343" r="11" fill="#9aa0a6"/>
    <circle cx="443" cy="383" r="11" fill="#9aa0a6"/><circle cx="500" cy="386" r="11" fill="#9aa0a6"/>
    <circle cx="610" cy="276" r="11" fill="#9aa0a6"/><circle cx="632" cy="322" r="11" fill="#9aa0a6"/>
    <circle cx="300" cy="430" r="11" fill="#d98a3d"/><circle cx="430" cy="430" r="11" fill="#9aa0a6"/>
    <circle cx="540" cy="430" r="11" fill="#d98a3d"/><circle cx="185" cy="320" r="11" fill="#9aa0a6"/>
  </g>
  <g font-size="9.5" font-weight="bold" fill="#fff" text-anchor="middle">
    <text x="335" y="119">1</text><text x="435" y="119">2</text><text x="535" y="119">3</text>
    <text x="585" y="119">4</text><text x="635" y="119">5</text>
    <text x="443" y="344">6</text><text x="500" y="347">7</text><text x="443" y="387">8</text>
    <text x="500" y="390">9</text><text x="610" y="280">10</text><text x="632" y="326">11</text>
    <text x="300" y="434">12</text><text x="430" y="434">13</text><text x="540" y="434">14</text><text x="185" y="324">15</text>
  </g>

  <!-- ===== OPERATORS ===== -->
  <g font-size="10" text-anchor="middle">
    <circle cx="485" cy="68" r="13" fill="#c0392b" stroke="#7b241c" stroke-width="2"/><text x="485" y="72" fill="#fff" font-weight="bold">M</text>
    <text x="600" y="100" fill="#7b241c" font-weight="bold" text-anchor="middle">Mara (bartender)</text>
    <circle cx="385" cy="115" r="13" fill="#c0392b" stroke="#7b241c" stroke-width="2"/><text x="385" y="119" fill="#fff" font-weight="bold">V</text>
    <text x="385" y="143" fill="#7b241c" font-weight="bold">Voss</text>
    <circle cx="250" cy="258" r="13" fill="#c0392b" stroke="#7b241c" stroke-width="2"/><text x="250" y="262" fill="#fff" font-weight="bold">G</text>
    <text x="250" y="240" fill="#7b241c" font-weight="bold">Garrity (lead)</text>
    <circle cx="610" cy="215" r="13" fill="#c0392b" stroke="#7b241c" stroke-width="2"/><text x="610" y="219" fill="#fff" font-weight="bold">P</text>
    <text x="610" y="197" fill="#7b241c" font-weight="bold">Pike (flank)</text>
  </g>

  <!-- TODD -->
  <circle cx="485" cy="115" r="14" fill="#f1c40f" stroke="#b8901a" stroke-width="2.5"/>
  <text x="485" y="119" font-size="11" text-anchor="middle" font-weight="bold" fill="#5a4500">T</text>
  <text x="485" y="142" font-size="10.5" text-anchor="middle" font-weight="bold" fill="#9a7400">TODD (at the bar)</text>

  <!-- cameras -->
  <g text-anchor="middle">
    <g><circle cx="485" cy="150" r="7" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="485" y="153" font-size="8" fill="#c0392b" font-weight="bold">C2</text></g>
    <g><circle cx="385" cy="252" r="7" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="385" y="255" font-size="8" fill="#c0392b" font-weight="bold">C3</text></g>
    <g><circle cx="385" cy="498" r="7" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="385" y="501" font-size="8" fill="#c0392b" font-weight="bold">C1</text></g>
    <g><circle cx="702" cy="180" r="7" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="702" y="183" font-size="8" fill="#c0392b" font-weight="bold">C4</text></g>
  </g>

  <!-- walls + exits -->
  <g stroke="#333" stroke-width="5" fill="none" stroke-linecap="square">
    <line x1="60" y1="55" x2="710" y2="55"/>
    <line x1="60" y1="505" x2="310" y2="505"/><line x1="460" y1="505" x2="710" y2="505"/>
    <line x1="60" y1="55" x2="60" y2="305"/><line x1="60" y1="355" x2="60" y2="505"/>
    <line x1="710" y1="55" x2="710" y2="105"/><line x1="710" y1="205" x2="710" y2="505"/>
  </g>
  <text x="385" y="524" font-size="11" text-anchor="middle" fill="#1e6b3a" font-weight="bold">▼ ARCH → LOBBY · FRONT DOORS · STREET</text>
  <text x="715" y="158" font-size="10.5" fill="#1e6b3a" font-weight="bold">→ kitchen /</text>
  <text x="715" y="172" font-size="10.5" fill="#1e6b3a" font-weight="bold">BACK ALLEY</text>
  <text x="30" y="333" font-size="11" fill="#1e6b3a" font-weight="bold" transform="rotate(-90 30 333)">WC ←</text>

  <!-- ===================== RIGHT: KEY + TRAP ===================== -->
  <rect x="745" y="60" width="350" height="445" fill="#fbfaf6" stroke="#ccc" stroke-width="1.5"/>
  <text x="762" y="84" font-size="14" font-weight="bold">Key</text>
  <g font-size="11.5" fill="#333">
    <circle cx="772" cy="106" r="11" fill="#c0392b" stroke="#7b241c" stroke-width="2"/><text x="792" y="110">Committee operator</text>
    <circle cx="772" cy="132" r="11" fill="#f1c40f" stroke="#b8901a" stroke-width="2"/><text x="792" y="136">Todd — at the bar</text>
    <circle cx="772" cy="158" r="10" fill="#9aa0a6" stroke="#6c7075" stroke-width="1.5"/><text x="792" y="162">civilian (grey = ordinary)</text>
    <circle cx="772" cy="184" r="10" fill="#d98a3d" stroke="#6c7075" stroke-width="1.5"/><text x="792" y="188">⚠ civilian wildcard (#12, #14)</text>
    <rect x="763" y="202" width="18" height="13" fill="#c0392b" fill-opacity="0.16"/><text x="792" y="213">camera view (C1–C4)</text>
    <rect x="763" y="223" width="18" height="13" fill="url(#blind)" stroke="#3b6ea5" stroke-opacity="0.4"/><text x="792" y="234">camera BLIND spot</text>
  </g>
  <line x1="762" y1="252" x2="1078" y2="252" stroke="#ddd"/>
  <text x="762" y="272" font-size="12.5" font-weight="bold" fill="#7b241c">The trap, at a glance</text>
  <g font-size="11" fill="#444">
    <text x="762" y="292">• Todd's exposed at the bar, under C2, with Mara</text>
    <text x="772" y="307">across — his "on-the-house" drink is the dosed one.</text>
    <text x="762" y="326">• Ops are spread (bar / lounge-W / lounge-E): one</text>
    <text x="772" y="341">Hypnotic Pattern catches ≤2, never Mara.</text>
    <text x="762" y="360">• Job: get Todd off the stool to a blind spot</text>
    <text x="772" y="375">(NW booth / WC / alley) and out — before 2</text>
    <text x="772" y="390">PCs are detected (→ the move: §7).</text>
    <text x="762" y="409">• Phones (#1, 2, 5, 8, 14) = extra cameras.</text>
    <text x="762" y="428">• #12 (cop) and #14 (streamer) are the live</text>
    <text x="772" y="443">complications if it turns.</text>
  </g>
  <line x1="762" y1="460" x2="1078" y2="460" stroke="#ddd"/>
  <text x="762" y="479" font-size="10.5" fill="#666">Outside (off-map): Renner (overwatch) + Driver.</text>
  <text x="762" y="494" font-size="10.5" fill="#666">Full rules → todd-encounter.md</text>

  <!-- ===================== OPERATORS DETAIL ===================== -->
  <text x="60" y="548" font-size="14" font-weight="bold" fill="#7b241c">OPERATORS — appearance · cover · tell   (all 4 inside carry a Stillpoint injector + 1 antidote)</text>
  <g font-size="10.5" fill="#333">
    <!-- M -->
    <text x="60" y="568" font-weight="bold" fill="#7b241c">M — Mara · "bartender"</text>
    <text x="60" y="582">~40, copper hair tied back, black vest + "MARA" badge,</text>
    <text x="60" y="594">sleeves rolled. Set a fresh drink before Todd "on the</text>
    <text x="60" y="606">house" he didn't order — the dosed one. Tell: works</text>
    <text x="60" y="618">only his end, waves the server off; earpiece. (DC 18)</text>
    <!-- V -->
    <text x="60" y="640" font-weight="bold" fill="#7b241c">V — Voss · at the bar (2 stools from Todd)</text>
    <text x="60" y="654">Late 30s, grey quarter-zip, gym build, short fade, a</text>
    <text x="60" y="666">too-new wedding band. Tell: a full pint going warm,</text>
    <text x="60" y="678">glass dry of sweat; eyes track the doors in the mirror.</text>
    <!-- G -->
    <text x="420" y="568" font-weight="bold" fill="#7b241c">G — Garrity · the LEAD · west two-top (alone)</text>
    <text x="420" y="582">~50, navy blazer, open collar, glasses pushed up,</text>
    <text x="420" y="594">wheeled laptop bag against his chair. Sits at the lone</text>
    <text x="420" y="606">west two-top, angled to see the bar AND the arch.</text>
    <text x="420" y="618">Tell: bag never opens; one club soda; the other</text>
    <text x="420" y="630">strangers' eyes flick to him before they move.</text>
    <!-- P -->
    <text x="420" y="652" font-weight="bold" fill="#7b241c">P — Pike · the FLANK · lounge-east</text>
    <text x="420" y="666">Early 30s, athletic, henley + dark jacket, cap low,</text>
    <text x="420" y="678">clean boots that don't match the room. Took the one</text>
    <text x="420" y="690">chair backed to a wall with lanes to bar and corridor.</text>
    <text x="420" y="702">Tell (subtle): too still — declines the server, touches</text>
    <text x="420" y="714">nothing, reads each new arrival a half-beat early.</text>
    <!-- Renner -->
    <text x="775" y="568" font-weight="bold" fill="#7b241c">Renner · OVERWATCH (outside)</text>
    <text x="775" y="582">40s, weathered, in a grey sedan on parking-structure</text>
    <text x="775" y="594">level 3; a phone propped on the dash filming the</text>
    <text x="775" y="606">entrance. Calls the chase. Never enters.</text>
    <!-- Driver -->
    <text x="775" y="628" font-weight="bold" fill="#7b241c">Driver · (outside)</text>
    <text x="775" y="642">Heavyset, shaved head, black Suburban idling on the</text>
    <text x="775" y="654">side street, eyes in the mirrors. Exfil + first chase car.</text>
  </g>

  <line x1="60" y1="732" x2="1095" y2="732" stroke="#ddd"/>

  <!-- ===================== CIVILIANS DETAIL ===================== -->
  <text x="60" y="752" font-size="14" font-weight="bold" fill="#444">CIVILIANS — ~15 in the room   (⚠ = a complication if it turns · "camera" = a phone pointed at the room)</text>
  <g font-size="10.5" fill="#333">
    <!-- col A 1-5 -->
    <text x="60" y="772" font-weight="bold">1</text><text x="78" y="772">Woman ~28, green wrap dress, blow-dried; a white</text>
    <text x="78" y="784">wine barely touched, phone face-up lighting with texts.</text>
    <text x="78" y="796">Watching the doors for a late date. (Camera.)</text>
    <text x="60" y="816" font-weight="bold">2</text><text x="78" y="816">Businessman ~45, loosened tie, scotch on the rocks,</text>
    <text x="78" y="828">roller bag at his feet, thumbing work email. (Phone.)</text>
    <text x="60" y="848" font-weight="bold">3</text><text x="78" y="848">Retiree ~70, Phillies cap, half a lager, ruddy and</text>
    <text x="78" y="860">chatty — already talked baseball at two strangers.</text>
    <text x="78" y="872">Loudmouth who'll "help" and make it worse.</text>
    <text x="60" y="892" font-weight="bold">4</text><text x="78" y="892">His wife ~68, cardigan, herbal tea, tired; turning her</text>
    <text x="78" y="904">ring, checking her watch. Wants to go up to the room.</text>
    <text x="60" y="924" font-weight="bold">5</text><text x="78" y="924">Hotel guest ~25, grey hoodie, AirPods in, slouched</text>
    <text x="78" y="936">over a phone video, plate of fries. Oblivious. (Camera.)</text>
    <!-- col B 6-10 -->
    <text x="420" y="772" font-weight="bold">6</text><text x="438" y="772">Sales rep ~35, untucked shirt, three empties, laughing</text>
    <text x="438" y="784">too loud at the boss. (Centre-table foursome, #6–9.)</text>
    <text x="420" y="804" font-weight="bold">7</text><text x="438" y="804">The boss ~50, sport coat, signet ring, holding court,</text>
    <text x="438" y="816">waving for another round. Expense-account loud.</text>
    <text x="420" y="836" font-weight="bold">8</text><text x="438" y="836">Junior ~26, blazer, checked-out, texting under the</text>
    <text x="438" y="848">table edge — phone aimed at the room. Would</text>
    <text x="438" y="860">livestream a fight in a heartbeat. (Camera.)</text>
    <text x="420" y="880" font-weight="bold">9</text><text x="438" y="880">The fourth ~40, wallet out, perpetually up at the bar</text>
    <text x="438" y="892">for the next round.</text>
    <text x="420" y="912" font-weight="bold">10</text><text x="442" y="912">Young woman ~24, on a date, leaning in, laughing,</text>
    <text x="442" y="924">totally absorbed in him. Pure collateral.</text>
    <!-- col C 11-15 -->
    <text x="775" y="772" font-weight="bold">11</text><text x="797" y="772">Her date ~27, button-down, eyes only on her, back to</text>
    <text x="797" y="784">the room. Same — won't notice until far too late.</text>
    <text x="775" y="804" font-weight="bold" fill="#b5651d">12 ⚠</text><text x="814" y="804">Off-duty SEPTA transit cop ~40, plainclothes polo</text>
    <text x="797" y="816">over a holstered compact, one beer, sat to see the</text>
    <text x="797" y="828">door. Will draw / badge / call it in / wade in if it turns.</text>
    <text x="775" y="848" font-weight="bold">13</text><text x="797" y="848">Business traveler ~38, headphones, laptop open,</text>
    <text x="797" y="860">spreadsheet glow, untouched coffee. Notices nothing</text>
    <text x="797" y="872">until gunfire.</text>
    <text x="775" y="892" font-weight="bold" fill="#b5651d">14 ⚠</text><text x="814" y="892">Influencer ~23, ring-light + phone on a mini-tripod,</text>
    <text x="797" y="904">doing a breezy "Philly hotel-bar review" to camera —</text>
    <text x="797" y="916">recording the whole room. Can't be routed around.</text>
    <text x="775" y="924" font-weight="bold">15</text><text x="797" y="924">Elderly man ~80, tweed cap, folded paper, hearing</text>
    <text x="797" y="936">aids, half-glass of port. Slow to register, slow to move.</text>
  </g>
</svg>
