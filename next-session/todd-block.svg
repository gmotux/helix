    <circle cx="922" cy="264" r="10" fill="#7d5a2c"/><text x="940" y="268">west spots (P, V, R)</text>
    <circle cx="922" cy="288" r="10" fill="#444"/><text x="940" y="292">south spots (D, C, T, PS)</text>
