  <text x="390" y="404" font-size="10.5" text-anchor="middle" fill="#5e533a" font-weight="bold">lounge + bar</text>
  <text x="390" y="418" font-size="9.5" text-anchor="middle" fill="#5e533a">(interior map)</text>
  <rect x="360" y="448" width="80" height="26" fill="#c9bfa6" stroke="#9a8f72" stroke-width="1.5"/>
  <rect x="373" y="455" width="54" height="6" fill="#fff"/>
