    <g><circle cx="455" cy="461" r="9" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="455" y="464" fill="#c0392b">X1</text></g>
    <g><circle cx="498" cy="205" r="9" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="498" y="208" fill="#c0392b">X3</text></g>
    <g><circle cx="600" cy="478" r="9" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="600" y="481" fill="#c0392b">X4</text></g>
    <g><circle cx="638" cy="520" r="9" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="638" y="523" fill="#c0392b">X5</text></g>
    <g><circle cx="125" cy="524" r="9" fill="#fff" stroke="#c0392b" stroke-width="2"/><text x="125" y="527" fill="#c0392b">X6</text></g>
  </g>

  <!-- ===== LEGEND ===== -->
  <rect x="895" y="70" width="335" height="475" fill="#fbfaf6" stroke="#ccc" stroke-width="1.5"/>
  <text x="912" y="94" font-size="14" font-weight="bold">Key</text>
  <g font-size="11" fill="#333">
