  <text x="622" y="150" font-size="10.5" font-weight="bold" fill="#7a7468" text-anchor="middle" transform="rotate(90 622 150)">SIDE ST</text>
  <text x="182" y="300" font-size="10" font-weight="bold" fill="#7a7468" text-anchor="middle" transform="rotate(90 182 300)">cross st</text>
  <text x="380" y="211" font-size="10.5" font-weight="bold" fill="#7a7468" text-anchor="middle">BACK ALLEY</text>

