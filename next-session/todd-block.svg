  <line x1="912" y1="308" x2="1212" y2="308" stroke="#ddd"/>
  <text x="912" y="328" font-size="12" font-weight="bold" fill="#7b241c">The spots (full write-ups → md)</text>
  <g font-size="10.3" fill="#444">
    <text x="912" y="345">B Esquina bodega · L laundromat ·</text>
    <text x="912" y="359">A walk-up apts · P Liberty Pawn ·</text>
    <text x="912" y="373">V the Anchor (bar) · R West Row + church ·</text>
    <text x="912" y="387">D Silver Star diner · C Kim's Cleaners ·</text>
    <text x="912" y="401">T townhouses · PS parking structure</text>
    <text x="912" y="419" font-style="italic" fill="#777">Each has a comic NPC, a serious NPC, and a</text>
    <text x="912" y="433" font-style="italic" fill="#777">criminal hook. Getaway cars at D, PS, R.</text>
  </g>
  <line x1="912" y1="449" x2="1212" y2="449" stroke="#ddd"/>
  <text x="912" y="468" font-size="12" font-weight="bold" fill="#7b241c">If it goes to a chase</text>
  <g font-size="10.3" fill="#444">
    <text x="912" y="485">Suburban chases + Renner vectors (or comes</text>
    <text x="912" y="499">down the ramp); a 2nd car can enter at X4.</text>
    <text x="912" y="513">Break LOS via the alley, the structure ramps,</text>
    <text x="912" y="527">or townhouse gaps. Pursuit → todd-encounter §8.</text>
  </g>
