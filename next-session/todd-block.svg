  <g stroke="#1e6b3a" stroke-width="2.5" stroke-dasharray="9 6" fill="none" marker-end="url(#gArrow)">
    <path d="M355,478 L150,498"/>
    <path d="M452,478 L585,495"/>
    <path d="M498,229 L498,205 L210,205"/>
    <path d="M182,225 L182,470"/>
  </g>
  <text x="300" y="200" font-size="9.5" fill="#1e6b3a" font-weight="bold">covert exit (Renner-blind)</text>

