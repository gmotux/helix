<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="620" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="gArrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0,0 L9,4.5 L0,9 z" fill="#1e6b3a"/></marker>
    <pattern id="deck" width="14" height="14" patternUnits="userSpaceOnUse"><rect width="14" height="14" fill="#ccc6b6"/><line x1="0" y1="0" x2="14" y2="0" stroke="#aaa294" stroke-width="1"/></pattern>
  </defs>
  <rect width="1240" height="620" fill="#f5f3ee"/>
  <text x="55" y="28" font-size="18" font-weight="bold" fill="#222">Todd Extraction — the block · Philadelphia Holiday Inn</text>
  <text x="55" y="45" font-size="11.5" fill="#666">N up · lettered spots → todd-block-spots.md (interior + comic NPC + serious NPC + a criminal hook each) · FRONT is watched; BACK ALLEY is Renner-blind (X3 still films the dock)</text>

  <!-- ===== STREETS ===== -->
  <g fill="#d6d1c3">
    <rect x="160" y="70" width="45" height="455"/>
    <rect x="160" y="185" width="720" height="40"/>
    <rect x="590" y="70" width="65" height="455"/>
    <rect x="110" y="465" width="755" height="55"/>
  </g>
  <line x1="120" y1="492" x2="858" y2="492" stroke="#fff" stroke-width="2" stroke-dasharray="15 11"/>
